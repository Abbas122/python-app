    #Scane the Docker File for issues and CVS
    name: Docker Lint

    on:
        workflow_call:

    jobs: 
        validate-dockerfile:
            runs-on: ubuntu-latest
            steps:
             - name: Checkout code
               uses: actions/checkout@v4
            
             - name: validate Dockerfile
               uses: hadolint/hadolint-action@v3.0.0
               with:
                 dockefile: Dockerfile

