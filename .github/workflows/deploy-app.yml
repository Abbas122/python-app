name: deploy-app
on:
  workflow_dispatch: 

jobs:
    deploy:
      env:
        DOCKERHUB_USER : ${{vars.DOCKER_USERNAME}}
      runs-on: self-hosted
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Stop existing containers
         run: |
          docker compose down || echo "No containers to stop"
        
        - name: deloy with docker compose
          run: docker compose up -d  --build
  
