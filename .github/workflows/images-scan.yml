#uses trivy images scanner for CVSs
name: Image Scanner

on: 
  workflow_call:

jobs:
  image-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Trivy Scanner
        uses: aquasecurity/trivy-action@0.65.1
        with:
          scan-type: image
          scan-ref: ${{ vars.DOCKER_USERNAME }}/python-flask-app:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
    
  
